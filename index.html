<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task-Switching Auditivo</title>
    <link rel="stylesheet" href="src/css/style.css">
</head>
<body>
    <div id="app">
        <div id="screen-container"></div>
    </div>
    <template id="audio-test-template">
        <div class="card">
            <h2>Teste de Áudio</h2>
            <p>Escute os áudios clicando no botão e digite os números ditos separados por espaço</p>
            <button class="btn-action" onclick="playRapportAudio()">Ouvir Áudio</button><br>
            <input type="text" id="rapport-in" class="rapport-input" placeholder="Digite aqui"><br>
            <button class="btn-action" onclick="checkRapport()">Validar</button>
            <p id="rapport-msg" style="color:var(--error); font-weight:bold;"></p>
        </div>
    </template>
    <template id="stage1-instr-template">
        <div class="card">
            <h2>Etapa 1: Par x Ímpar</h2>
            <p>Para a primeira etapa do teste você escutará uma voz MASCULINA falar uma série de números, um de cada vez.</p>
            <p>Sua tarefa é decidir o mais rápido possível se este número é <strong>PAR</strong> ou <strong>ÍMPAR</strong>.</p>
            <div class="key-hints">
                <div class="key-box"><b>A</b><span>PAR</span></div>
                <div class="key-box"><b>L</b><span>ÍMPAR</span></div>
            </div>
            <p>Responda da forma mais rápida e precisa que conseguir. Se você errar, um sinal sonoro irá soar. Simplesmente corrija a sua resposta e continue.</p>
            <p><b>Quando estiver preparado pressione ESPAÇO para iniciar.</b></p>
        </div>
    </template>
    <template id="stage2-instr-template">
        <div class="card">
            <h2>Etapa 2: Menor x Maior</h2>
            <p>Para a próxima etapa do teste você escutará uma voz FEMININA falar uma série de números, um de cada vez.</p>
            <p>Pressione a tecla <b>A</b> se o número for <strong>MENOR QUE 5</strong>.<br>Pressione a tecla <b>L</b> se o número for <strong>MAIOR QUE 5</strong>.</p>
            <div class="key-hints">
                <div class="key-box"><b>A</b><span>MENOR &lt; 5</span></div>
                <div class="key-box"><b>L</b><span>MAIOR &gt; 5</span></div>
            </div>
            <p>Responda da forma mais rápida e precisa que conseguir. Se você errar, um sinal sonoro irá soar. Simplesmente corrija a sua resposta e continue.</p>
            <p><b>Quando estiver preparado pressione ESPAÇO para iniciar.</b></p>
        </div>
    </template>
    <template id="stage3-instr-template">
        <div class="card">
            <h2>Etapa 3: Alternando Tarefas</h2>
            <p>Agora vamos combinar as duas tarefas em uma:</p>
            <p><b>Se a voz for MASCULINA:</b> Classifique o número entre PAR ou ÍMPAR.<br>
            <b>Se a voz for FEMININA:</b> Classifique o número entre MENOR ou MAIOR que 5.</p>
            <div class="key-hints">
                <div class="key-box"><b>A</b><span>PAR<br>ou &lt; 5</span></div>
                <div class="key-box"><b>L</b><span>ÍMPAR<br>ou &gt; 5</span></div>
            </div>
            <p>Responda da forma mais rápida e precisa que conseguir. Se você errar, um sinal sonoro irá soar. Simplesmente corrija a sua resposta e continue.</p>
            <p><b>Quando estiver preparado pressione ESPAÇO para iniciar.</b></p>
        </div>
    </template>
    <template id="positioning-template">
        <div class="card" style="justify-content:center; text-align:center; display:flex; flex-direction:column; align-items:center;">
            <p style="font-size:1.3rem; margin-bottom:2rem;">
                Posicione seu indicador esquerdo sobre a tecla <b>A</b> e o direito sobre a tecla <b>L</b>
            </p>
            <div class="key-hints">
                <div class="key-box"><b>A</b><span>←</span></div>
                <div class="key-box"><b>L</b><span>→</span></div>
            </div>
            <p style="margin-top:2rem"><b>Pressione ESPAÇO para iniciar.</b></p>
        </div>
    </template>
    <audio id="audio-error" src="src/audio/error.mp3"></audio>
    <script src="src/js/script.js"></script>
</body>
</html>
